<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>单聊系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .chat-container {
            display: flex;
            width: 900px;
            height: 650px;
            margin: 30px auto;
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .user-list {
            width: 220px;
            background: #f5f7f9;
            border-right: 1px solid #eee;
            padding: 15px;
        }

        .user-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .user-item.active {
            background: #4292dc;
            color: white;
        }

        .chat-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fafbfc;
        }

        .chat-header {
            padding: 15px;
            background: white;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            color: #333;
        }

        .msg-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #fafbfc;
        }

        .msg {
            display: table;
            width: auto;
            margin-bottom: 15px;
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-left {
            background: white;
            align-self: flex-start;
            border: 1px solid #eee;
        }

        .msg-right {
            background: #4292dc;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }

        .input-box {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }

        #text {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #4292dc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #3385ce;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="user-list">
        <div class="user-item active" id="chatTo"></div>
    </div>

    <div class="chat-box">
        <div class="chat-header">与 <span id="nickname"></span> 聊天中</div>
        <div class="msg-container" id="msgContainer"></div>

        <div class="input-box">
            <input type="text" id="text" placeholder="输入消息...">
            <button onclick="send()">发送</button>
        </div>
    </div>
</div>

<script>
    // ====================== 从 URL 获取用户信息 ======================
    function getQueryParam(name) {
        let urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    let uid = getQueryParam("uid") || "user1";
    let to = getQueryParam("to") || "user2";
    let roomId = [uid, to].sort().join("_");

    document.getElementById("chatTo").innerText = to;
    document.getElementById("nickname").innerText = to;

    // ====================== 自动连接当前服务器（支持多设备） ======================
    let ws = new WebSocket(`ws://${window.location.host}/chat?roomId=${roomId}`);
    let msgContainer = document.getElementById("msgContainer");
    let textInput = document.getElementById("text");

    ws.onmessage = function (evt) {
        let data = evt.data;
        let isMe = data.startsWith("[" + uid + "]");

        let div = document.createElement("div");
        div.className = "msg " + (isMe ? "msg-right" : "msg-left");
        div.innerText = data.replace(/^\[\w+\]：/, "");
        msgContainer.appendChild(div);
        msgContainer.scrollTop = msgContainer.scrollHeight;
    };

    // ====================== 发送消息 ======================
    function send() {
        let content = textInput.value.trim();
        if (!content) return;
        ws.send("[" + uid + "]：" + content);
        textInput.value = "";
    }

    // ====================== ✅ 回车发送消息（Enter） ======================
    textInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            send();
        }
    });
</script>
</body>
</html>
